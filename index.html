<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유럽 여행 일정 (Cloud Sync)</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e3a8a">
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .app-container { height: 100vh; height: -webkit-fill-available; overflow: hidden; }
        .sidebar-width { width: 100%; height: 50%; }
        .map-height { height: 50%; }
        @media (min-width: 768px) {
            .sidebar-width { width: 450px; height: 100%; }
            .map-height { height: 100%; }
        }
        
        .custom-marker {
            display: flex; justify-content: center; align-items: center;
            width: 32px; height: 32px; background-color: #ef4444; color: white;
            border-radius: 50%; font-weight: bold; font-size: 14px; border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sortable-ghost { opacity: 0.4; background-color: #f3f4f6; }
        .sortable-drag { cursor: grabbing !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        
        #modal-map { height: 200px; width: 100%; border-radius: 0.5rem; z-index: 10; }
        
        /* 로딩 스피너 애니메이션 */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 app-container relative">

    <!-- 초기 로딩 오버레이 -->
    <div id="loading-overlay" class="fixed inset-0 bg-blue-900 z-[100] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <i class="fa-solid fa-cloud-arrow-down text-5xl mb-4"></i>
        <h2 class="text-xl font-bold mb-2">여행 일정 동기화 중...</h2>
        <div class="loader mt-4"></div>
    </div>

    <!-- 토스트 알림 -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-xl shadow-2xl transition-opacity duration-300 opacity-0 pointer-events-none z-[100] font-bold text-sm text-center min-w-[200px]"></div>

    <!-- 1. HOME VIEW -->
    <div id="view-home" class="absolute inset-0 z-40 bg-gray-50 flex flex-col transition-opacity duration-300 opacity-0 hidden">
        <div class="pt-12 pb-8 px-6 bg-blue-900 text-white rounded-b-3xl shadow-lg relative">
            <div class="absolute top-4 right-6 text-xs bg-blue-800 px-3 py-1 rounded-full flex items-center gap-2">
                <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div> 실시간 동기화 중
            </div>
            <h1 class="text-3xl font-black mb-2 tracking-tight mt-4"><i class="fa-solid fa-plane-departure mr-2"></i>유럽 여행</h1>
            <p class="text-blue-200 font-medium opacity-90">런던 ➔ 암스테르담 (7.24 ~ 8.1)</p>
        </div>

        <div class="flex-1 px-6 py-10 flex flex-col gap-6">
            <button onclick="switchView('view-map')" class="group relative bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-5 hover:shadow-md hover:border-blue-200 transition text-left active:scale-95">
                <div class="w-16 h-16 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-2xl shadow-inner group-hover:scale-110 transition"><i class="fa-solid fa-map-location-dot"></i></div>
                <div>
                    <h3 class="text-xl font-bold text-gray-900 mb-1">지도 일정 보기</h3>
                    <p class="text-sm text-gray-500">동선과 세부 일정을 확인합니다.</p>
                </div>
            </button>

            <button onclick="switchView('view-manage')" class="group relative bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-5 hover:shadow-md hover:border-purple-200 transition text-left active:scale-95">
                <div class="w-16 h-16 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center text-2xl shadow-inner group-hover:scale-110 transition"><i class="fa-solid fa-calendar-plus"></i></div>
                <div>
                    <h3 class="text-xl font-bold text-gray-900 mb-1">일정 수정/관리</h3>
                    <p class="text-sm text-gray-500">함께 일정을 편집하고 장소를 추가합니다.</p>
                </div>
            </button>
        </div>
    </div>

    <!-- 2. MAP VIEW -->
    <div id="view-map" class="absolute inset-0 z-30 hidden flex flex-col md:flex-row bg-white">
        <div class="sidebar-width bg-white shadow-xl flex flex-col z-20">
            <div class="p-4 bg-blue-900 text-white shadow-md flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="switchView('view-home')" class="p-2 bg-white/20 rounded-full w-10 h-10 flex items-center justify-center active:scale-95"><i class="fa-solid fa-arrow-left"></i></button>
                    <h1 class="text-lg font-bold">지도 일정</h1>
                </div>
            </div>
            <div class="flex overflow-x-auto bg-gray-100 border-b no-scrollbar" id="map-tabs"></div>
            <div id="schedule-list" class="flex-1 overflow-y-auto p-4 bg-gray-50 pb-20"></div>
        </div>
        <div class="map-height md:h-screen relative w-full md:flex-1"><div id="map" class="w-full h-full z-10"></div></div>
    </div>

    <!-- 3. MANAGE VIEW -->
    <div id="view-manage" class="absolute inset-0 z-30 hidden flex flex-col bg-gray-50">
        <div class="p-4 bg-purple-900 text-white shadow-md flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="switchView('view-home')" class="p-2 bg-white/20 rounded-full w-10 h-10 flex items-center justify-center active:scale-95"><i class="fa-solid fa-arrow-left"></i></button>
                <h1 class="text-lg font-bold">일정 관리</h1>
            </div>
            <button onclick="openModal()" class="bg-white text-purple-900 px-3 py-1.5 rounded-lg text-sm font-bold shadow-md hover:bg-gray-100 active:scale-95 transition flex items-center gap-1">
                <i class="fa-solid fa-plus"></i> 장소
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 w-full pb-20" id="manage-board"></div>
    </div>

    <!-- 모달: 장소 자연어 검색 및 추가 -->
    <div id="edit-modal" class="hidden fixed inset-0 z-50 bg-black/60 flex items-end md:items-center justify-center p-0 md:p-4 transition-opacity">
        <div class="bg-white w-full h-[85vh] md:h-auto md:max-w-lg rounded-t-2xl md:rounded-2xl flex flex-col shadow-2xl overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 shrink-0">
                <h3 id="modal-title" class="text-lg font-bold text-gray-900">장소 검색 및 추가</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 overflow-y-auto flex-1 space-y-4">
                <input type="hidden" id="modal-index">
                <input type="hidden" id="modal-day">
                
                <div class="bg-purple-50 p-3 rounded-lg border border-purple-100">
                    <label class="block text-xs font-bold text-purple-800 mb-1">장소 검색</label>
                    <div class="flex gap-2">
                        <input type="text" id="place-search" placeholder="예: Amsterdam Centraal" class="flex-1 bg-white border border-purple-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500" onkeypress="if(event.key === 'Enter') searchPlace()">
                        <button onclick="searchPlace()" class="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-bold active:scale-95 flex items-center justify-center w-12"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>

                <div class="relative border border-gray-200 rounded-lg overflow-hidden">
                    <div id="modal-map"></div>
                </div>

                <div class="flex gap-2 hidden"><input type="number" id="modal-lat"><input type="number" id="modal-lng"></div>

                <div class="space-y-3 pt-2">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">방문 날짜</label>
                        <select id="modal-day-select" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none font-bold text-gray-800"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">장소명 / 내용</label>
                        <input type="text" id="modal-name" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none font-bold text-gray-800">
                    </div>
                    <div class="flex gap-2">
                        <div class="w-1/3">
                            <label class="block text-xs font-bold text-gray-600 mb-1">시간</label>
                            <input type="text" id="modal-time" placeholder="10:00" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-600 mb-1">메모</label>
                            <input type="text" id="modal-desc" placeholder="예약 확인 등" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t flex gap-3 shrink-0 bg-white">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl active:scale-95 transition">취소</button>
                <button onclick="saveLocation()" class="flex-1 bg-purple-600 text-white font-bold py-3 rounded-xl active:scale-95 transition shadow-md">저장하기</button>
            </div>
        </div>
    </div>

    <!-- 모달: 삭제 확인 -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-[60] bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">일정 삭제</h3>
            <p class="text-sm text-gray-600 mb-6">이 장소를 완전히 삭제하시겠습니까?</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 bg-gray-100 text-gray-700 font-bold py-2.5 rounded-xl">취소</button>
                <button id="confirm-delete-btn" class="flex-1 bg-red-600 text-white font-bold py-2.5 rounded-xl">삭제</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Firebase Module Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정 (환경 변수 사용)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'trip-app-id';
        let firebaseConfig = {};
        try { if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config); } catch(e) {}

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 기본 데이터 (최초 1회 생성용)
        const defaultAppData = {
            1: { date: "7.24 (금)", title: "런던 도착", locations: [ { id: 101, name: "히드로 공항", lat: 51.4700, lng: -0.4543, time: "17:20", desc: "쓰리심 픽업, 코스타 대기" }, { id: 102, name: "킴튼 피츠로이 호텔", lat: 51.5225, lng: -0.1251, time: "19:00", desc: "체크인 및 휴식" } ] },
            2: { date: "7.25 (토)", title: "시내 투어", locations: [ { id: 201, name: "웨스트민스터역 4번출구", lat: 51.5014, lng: -0.1250, time: "08:40", desc: "카페 네로 앞 가이드 미팅" }, { id: 202, name: "대영박물관", lat: 51.5194, lng: -0.1270, time: "13:30", desc: "정문 건너편 스벅 (쉑쉑버거)" } ] },
            3: { date: "7.26 (일)", title: "해리포터/축구", locations: [ { id: 301, name: "해리포터 스튜디오", lat: 51.6930, lng: -0.4196, time: "08:30", desc: "여권 필수! (Watford Junction)" }, { id: 302, name: "아스널 에미레이트 구장", lat: 51.5549, lng: -0.1084, time: "15:30", desc: "샬롬치킨" } ] },
            4: { date: "7.27 (월)", title: "미술관 투어", locations: [ { id: 401, name: "내셔널 갤러리", lat: 51.5089, lng: -0.1283, time: "09:40", desc: "세인즈버리관 앞 벤치" }, { id: 402, name: "테이트 모던", lat: 51.5076, lng: -0.0994, time: "15:00", desc: "템즈강쪽 입구 왼쪽" } ] },
            5: { date: "7.28 (화)", title: "랜드마크 & 라이언킹", locations: [ { id: 501, name: "웨스트민스터 역", lat: 51.5014, lng: -0.1250, time: "08:00", desc: "가족 스냅 (국회의사당 샵 앞)" }, { id: 502, name: "자연사 박물관", lat: 51.4967, lng: -0.1764, time: "10:00", desc: "Exhibition road 1번 기둥" }, { id: 503, name: "런던탑 & 타워브릿지", lat: 51.5081, lng: -0.0759, time: "13:00", desc: "지인 가족 만남" }, { id: 504, name: "라이언킹 관람 (Lyceum)", lat: 51.5116, lng: -0.1193, time: "19:30", desc: "18:30까지 도착 필수" } ] },
            6: { date: "7.29 (수)", title: "암스테르담 이동", locations: [ { id: 601, name: "런던 세인트 판크라스 역", lat: 51.5314, lng: -0.1261, time: "11:04", desc: "유로스타 탑승" }, { id: 602, name: "암스테르담 중앙역", lat: 52.3791, lng: 4.9003, time: "16:20", desc: "도착 후 Uber 숙소이동" }, { id: 603, name: "암스테르담 메리어트", lat: 52.3629, lng: 4.8803, time: "17:00", desc: "체크인 (쉑쉑버거)" }, { id: 604, name: "안네 프랑크의 집", lat: 52.3752, lng: 4.8840, time: "18:00", desc: "관람" } ] },
            7: { date: "7.30 (목)", title: "암스테르담 시내", locations: [ { id: 701, name: "고흐 미술관 / 국립박물관", lat: 52.3584, lng: 4.8811, time: "09:00", desc: "고흐미술관 정문 (도보 11분)" }, { id: 702, name: "시내 투어", lat: 52.3791, lng: 4.9003, time: "14:00", desc: "중앙역 앞 GVB Service 부스" } ] },
            8: { date: "7.31 (금)", title: "벨기에 1일 투어", locations: [ { id: 801, name: "브뤼허 (Bruges)", lat: 51.2093, lng: 3.2247, time: "08:00", desc: "벨기에 투어 시작 (유로비 50)" }, { id: 802, name: "겐트 (Ghent)", lat: 51.0500, lng: 3.7303, time: "14:00", desc: "투어 경유" }, { id: 803, name: "브뤼셀 (Brussels)", lat: 50.8503, lng: 4.3517, time: "18:00", desc: "투어 후 22:00 종료" } ] },
            9: { date: "8.1 (토)", title: "풍차마을 & 귀국", locations: [ { id: 901, name: "암스테르담 중앙역", lat: 52.3791, lng: 4.9003, time: "12:00", desc: "체크아웃 후 이동" }, { id: 902, name: "잔담 (Zaandam)", lat: 52.4420, lng: 4.8292, time: "13:00", desc: "레고마을" }, { id: 903, name: "잔세스칸스", lat: 52.4731, lng: 4.8193, time: "14:30", desc: "풍차마을" }, { id: 904, name: "스키폴 공항", lat: 52.3105, lng: 4.7683, time: "18:30", desc: "21:30 KE926 출발" } ] }
        };

        // 앱 상태 변수
        let appData = null;
        let currentDay = 1;
        let totalDays = 9;
        let map, currentLayerGroup;
        let modalMap, modalMarker;
        let sortables = [];
        let isAppReady = false;
        let currentActiveView = 'view-home';

        // 알림 함수
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        }

        // 인증 프로세스 (필수)
        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        // 클라우드 데이터 동기화
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', 'shared');
                
                onSnapshot(docRef, (snapshot) => {
                    if (snapshot.exists()) {
                        appData = snapshot.data();
                    } else {
                        // 최초 접속 시 기본 데이터 클라우드에 세팅
                        appData = defaultAppData;
                        setDoc(docRef, defaultAppData);
                    }
                    
                    totalDays = Object.keys(appData).length;
                    
                    if (!isAppReady) {
                        initMapUI();
                        // 로딩 화면 숨기고 홈 화면 표시
                        const overlay = document.getElementById('loading-overlay');
                        overlay.classList.add('opacity-0');
                        setTimeout(() => {
                            overlay.classList.add('hidden');
                            document.getElementById('view-home').classList.remove('hidden');
                            setTimeout(() => document.getElementById('view-home').classList.remove('opacity-0'), 50);
                        }, 500);
                        isAppReady = true;
                    } else {
                        // 실시간 업데이트 반영
                        refreshCurrentView();
                        showToast("☁️ 클라우드 동기화 완료");
                    }
                }, (error) => {
                    console.error("Firestore Error:", error);
                    showToast("데이터를 불러오지 못했습니다.");
                });
            }
        });

        // 클라우드 저장 함수
        async function syncDataToCloud() {
            if(!appData) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'itinerary', 'shared');
            try {
                await setDoc(docRef, appData);
            } catch(e) {
                showToast("저장에 실패했습니다. 권한을 확인해주세요.");
            }
        }

        // 앱 초기 시작
        initAuth();

        // ------------------ UI 및 로직 함수들 ------------------

        function initMapUI() {
            map = L.map('map', { zoomControl: false }).setView([51.5074, -0.1278], 12);
            L.control.zoom({ position: 'topright' }).addTo(map);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            currentLayerGroup = L.layerGroup().addTo(map);
            
            initSelectOptions();
        }

        function refreshCurrentView() {
            if(currentActiveView === 'view-map') {
                renderMapTabs();
                selectMapDay(currentDay);
            } else if (currentActiveView === 'view-manage') {
                renderManageBoard();
            }
        }

        function switchView(viewId) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-map').classList.add('hidden');
            document.getElementById('view-manage').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
            
            currentActiveView = viewId;

            if (viewId === 'view-map') {
                setTimeout(() => map.invalidateSize(), 100);
                renderMapTabs();
                selectMapDay(currentDay);
            } else if (viewId === 'view-manage') {
                renderManageBoard();
            }
        }

        function initSelectOptions() {
            const select = document.getElementById('modal-day-select');
            let html = '';
            for(let i=1; i<=totalDays; i++) {
                html += `<option value="${i}">${i}일차 (${appData[i].date})</option>`;
            }
            select.innerHTML = html;
        }

        // MAP VIEW
        function renderMapTabs() {
            let html = '';
            for(let i=1; i<=totalDays; i++) {
                html += `<button onclick="window.selectMapDay(${i})" id="mtab-${i}" class="tab-btn px-4 py-3 font-medium text-sm whitespace-nowrap border-b-2 border-transparent text-gray-500 hover:text-blue-600 transition">${i}일차</button>`;
            }
            document.getElementById('map-tabs').innerHTML = html;
        }

        function selectMapDay(dayIndex) {
            if(!appData[dayIndex]) return;
            currentDay = dayIndex;
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-4 py-3 font-medium text-sm whitespace-nowrap border-b-2 border-transparent text-gray-500 hover:text-blue-600 transition");
            
            const activeTab = document.getElementById(`mtab-${dayIndex}`);
            if(activeTab) {
                activeTab.className = "tab-btn px-4 py-3 font-bold text-sm whitespace-nowrap border-b-2 border-blue-600 text-blue-600";
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            
            const data = appData[dayIndex];
            let html = `<h2 class="text-lg font-bold text-gray-800 mb-4">${data.date} <span class="text-sm font-normal text-gray-500 ml-2">${data.title}</span></h2>`;
            if (!data.locations || data.locations.length === 0) html += `<div class="text-center py-10 text-gray-400">등록된 일정이 없습니다.</div>`;
            
            currentLayerGroup.clearLayers();
            const bounds = L.latLngBounds();

            (data.locations || []).forEach((loc, index) => {
                const gmapLink = `https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}`;
                html += `
                    <div class="relative pl-8 pb-6">
                        ${index < data.locations.length - 1 ? `<div class="absolute left-[15px] top-8 bottom-0 w-0.5 bg-gray-300"></div>` : ''}
                        <div class="absolute left-0 top-1 w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center font-bold shadow-md border-2 border-white z-10">${index + 1}</div>
                        <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 relative group hover:border-blue-200 transition">
                            <div class="text-sm font-bold text-blue-600 mb-1">${loc.time || '시간 미정'}</div>
                            <h3 class="text-md font-bold text-gray-900 pr-12">${loc.name}</h3>
                            <p class="text-sm text-gray-600 mt-1">${loc.desc || ''}</p>
                            <a href="${gmapLink}" target="_blank" class="absolute top-4 right-4 text-green-600 bg-green-50 w-9 h-9 rounded-full flex items-center justify-center hover:bg-green-600 hover:text-white transition shadow-sm" title="구글 맵에서 열기">
                                <i class="fa-solid fa-location-arrow"></i>
                            </a>
                        </div>
                    </div>`;

                const icon = L.divIcon({ className: 'custom-div-icon', html: `<div class="custom-marker">${index + 1}</div>`, iconSize: [32, 32], iconAnchor: [16, 16] });
                const marker = L.marker([loc.lat, loc.lng], { icon: icon }).bindPopup(`<b>${loc.name}</b>`);
                currentLayerGroup.addLayer(marker);
                bounds.extend([loc.lat, loc.lng]);

                if (index < data.locations.length - 1) {
                    const nextLoc = data.locations[index + 1];
                    const polyline = L.polyline([[loc.lat, loc.lng], [nextLoc.lat, nextLoc.lng]], { color: '#3b82f6', weight: 3, dashArray: '8, 8', opacity: 0.8 });
                    currentLayerGroup.addLayer(polyline);
                }
            });
            document.getElementById('schedule-list').innerHTML = html;
            if((data.locations || []).length > 0) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
        }

        // MANAGE VIEW (Drag & Drop)
        function renderManageBoard() {
            const board = document.getElementById('manage-board');
            let html = '';
            
            sortables.forEach(s => s.destroy());
            sortables = [];

            for(let i=1; i<=totalDays; i++) {
                const data = appData[i];
                html += `
                <div class="mb-5 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-100 px-4 py-3 border-b font-bold text-gray-700 flex justify-between items-center">
                        <span>${i}일차 <span class="text-xs font-normal text-gray-500 ml-1">${data.date}</span></span>
                        <span class="text-xs font-bold text-purple-600 bg-purple-100 px-2 py-1 rounded-md">${data.title}</span>
                    </div>
                    <div id="day-list-${i}" data-day="${i}" class="sortable-list p-2 min-h-[60px] space-y-2 bg-gray-50">
                `;
                
                (data.locations || []).forEach((loc, index) => {
                    html += `
                        <div data-id="${loc.id}" data-index="${index}" class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 flex items-center gap-3">
                            <div class="drag-handle text-gray-300 hover:text-gray-500 px-2 text-xl"><i class="fa-solid fa-grip-lines"></i></div>
                            <div class="flex-1 overflow-hidden">
                                <div class="text-xs font-bold text-purple-600">${loc.time || '-'}</div>
                                <div class="font-bold text-gray-900 truncate">${loc.name}</div>
                            </div>
                            <div class="flex gap-1 shrink-0">
                                <button onclick="window.openModal(${i}, ${index})" class="w-8 h-8 text-blue-500 hover:bg-blue-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="window.confirmDelete(${i}, ${index})" class="w-8 h-8 text-red-500 hover:bg-red-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            board.innerHTML = html;

            document.querySelectorAll('.sortable-list').forEach(el => {
                const sortable = new Sortable(el, {
                    group: 'shared',
                    animation: 150,
                    handle: '.drag-handle',
                    ghostClass: 'sortable-ghost',
                    onEnd: function (evt) {
                        const oldDay = evt.from.dataset.day;
                        const newDay = evt.to.dataset.day;
                        const oldIndex = evt.oldIndex;
                        const newIndex = evt.newIndex;
                        
                        const item = appData[oldDay].locations.splice(oldIndex, 1)[0];
                        if(!appData[newDay].locations) appData[newDay].locations = [];
                        appData[newDay].locations.splice(newIndex, 0, item);
                        
                        // 화면 임시 업데이트 및 클라우드 전송
                        syncDataToCloud();
                        renderManageBoard();
                    }
                });
                sortables.push(sortable);
            });
        }

        // 모달 및 지도 검색
        function initModalMap() {
            if(!modalMap) {
                modalMap = L.map('modal-map', { zoomControl: false }).setView([51.5074, -0.1278], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(modalMap);
                modalMarker = L.marker([51.5074, -0.1278], { draggable: true }).addTo(modalMap);
                
                modalMarker.on('dragend', function () {
                    document.getElementById('modal-lat').value = modalMarker.getLatLng().lat;
                    document.getElementById('modal-lng').value = modalMarker.getLatLng().lng;
                });
                modalMap.on('click', function(e) {
                    modalMarker.setLatLng(e.latlng);
                    document.getElementById('modal-lat').value = e.latlng.lat;
                    document.getElementById('modal-lng').value = e.latlng.lng;
                });
            }
        }

        async function searchPlace() {
            const query = document.getElementById('place-search').value.trim();
            if(!query) { showToast('검색어를 입력해주세요.'); return; }
            
            const btn = document.querySelector('button[onclick="window.searchPlace()"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                
                if(data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lng = parseFloat(data[0].lon);
                    
                    modalMap.setView([lat, lng], 15);
                    modalMarker.setLatLng([lat, lng]);
                    document.getElementById('modal-lat').value = lat;
                    document.getElementById('modal-lng').value = lng;
                    
                    if(!document.getElementById('modal-name').value) {
                        let name = data[0].display_name.split(',')[0]; 
                        document.getElementById('modal-name').value = name;
                    }
                } else {
                    showToast('장소를 찾지 못했습니다.');
                }
            } catch(e) {
                showToast('검색 오류가 발생했습니다.');
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i>';
            }
        }

        function openModal(day = 1, index = null) {
            initModalMap();
            const isEdit = index !== null;
            document.getElementById('modal-title').innerText = isEdit ? '장소 수정' : '새 장소 추가';
            document.getElementById('modal-day').value = day;
            document.getElementById('modal-index').value = isEdit ? index : '';
            document.getElementById('modal-day-select').value = day;
            
            let defaultLat = day >= 6 ? 52.3791 : 51.5074; 
            let defaultLng = day >= 6 ? 4.9003 : -0.1278;

            if (isEdit) {
                const loc = appData[day].locations[index];
                document.getElementById('modal-name').value = loc.name;
                document.getElementById('modal-time').value = loc.time || '';
                document.getElementById('modal-desc').value = loc.desc || '';
                document.getElementById('place-search').value = ''; 
                defaultLat = loc.lat; defaultLng = loc.lng;
            } else {
                document.getElementById('modal-name').value = '';
                document.getElementById('modal-time').value = '';
                document.getElementById('modal-desc').value = '';
                document.getElementById('place-search').value = '';
            }
            
            document.getElementById('modal-lat').value = defaultLat;
            document.getElementById('modal-lng').value = defaultLng;
            document.getElementById('edit-modal').classList.remove('hidden');
            
            setTimeout(() => {
                modalMap.invalidateSize();
                modalMap.setView([defaultLat, defaultLng], 13);
                modalMarker.setLatLng([defaultLat, defaultLng]);
            }, 150);
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        function saveLocation() {
            const name = document.getElementById('modal-name').value.trim();
            if(!name) { showToast('장소명을 입력해주세요.'); return; }

            const oldDay = document.getElementById('modal-day').value;
            const newDay = document.getElementById('modal-day-select').value;
            const index = document.getElementById('modal-index').value;

            const newLoc = {
                id: index !== '' ? appData[oldDay].locations[index].id : Date.now(),
                name: name,
                time: document.getElementById('modal-time').value,
                desc: document.getElementById('modal-desc').value,
                lat: parseFloat(document.getElementById('modal-lat').value) || 51.5074,
                lng: parseFloat(document.getElementById('modal-lng').value) || -0.1278
            };

            if(!appData[newDay].locations) appData[newDay].locations = [];

            if (index !== '') {
                if (oldDay === newDay) {
                    appData[oldDay].locations[parseInt(index)] = newLoc;
                } else {
                    appData[oldDay].locations.splice(parseInt(index), 1);
                    appData[newDay].locations.push(newLoc);
                }
            } else {
                appData[newDay].locations.push(newLoc);
            }
            
            // 클라우드 저장 트리거
            syncDataToCloud();
            closeModal();
            renderManageBoard(); // 로컬 먼저 반영
        }

        // 삭제 로직
        let pendingDelete = null;
        function confirmDelete(day, index) {
            pendingDelete = { day, index };
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function closeConfirmModal() {
            pendingDelete = null;
            document.getElementById('confirm-modal').classList.add('hidden');
        }
        
        document.getElementById('confirm-delete-btn').addEventListener('click', () => {
            if(pendingDelete) {
                appData[pendingDelete.day].locations.splice(pendingDelete.index, 1);
                syncDataToCloud(); // 클라우드 저장
                renderManageBoard();
                closeConfirmModal();
            }
        });

        // HTML 태그에서 인라인으로 호출 가능하도록 window 객체에 할당 (Module 방식 제약 해소)
        window.switchView = switchView;
        window.selectMapDay = selectMapDay;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.saveLocation = saveLocation;
        window.confirmDelete = confirmDelete;
        window.closeConfirmModal = closeConfirmModal;
        window.searchPlace = searchPlace;

    </script>
</body>
</html>
